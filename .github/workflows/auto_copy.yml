name: 自动复制飞书漫剧素材

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1,5,9,13 * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4  # 从 v3 升级到 v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5  # 从 v4 升级到 v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install requests
      
      - name: 执行脚本
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python auto_copy_drama.py
      
      - name: 上传执行日志（如果失败时保留日志）
        if: failure()
        uses: actions/upload-artifact@v4  # 保持 v4
        with:
          name: error-log
          path: |
            auto_copy_drama.log
