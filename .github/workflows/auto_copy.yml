name: 自动复制剧目信息

on:
  # 手动触发（方便测试）
  workflow_dispatch:
  
  # 定时触发
  # 北京时间 = UTC + 8 小时
  schedule:
    # 每天 9:00, 13:00, 17:00, 21:00 执行（UTC 时间 1:00, 5:00, 9:00, 13:00）
    - cron: '0 1,5,9,13 * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
      
      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install requests
      
      - name: 执行脚本
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python auto_copy_drama.py
      
      - name: 上传执行日志（如果失败时保留日志）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: |
            *.log
            *.txt
